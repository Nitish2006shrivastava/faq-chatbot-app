<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI FAQ Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 CodeAlpha Support Bot</h2>
            <p>Online | Ask me anything about internships</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">
                Hello! I am your AI assistant. Ask me questions like "How to get a certificate?" or "What is CodeAlpha?"
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your question here..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
